<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Nations Community</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: sans-serif;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-900">

    <div id="header-placeholder"></div>

    <!-- Main Content -->
    <main class="container mx-auto px-6 md:px-12 lg:px-24 py-16">
        <h1 class="text-3xl md:text-4xl font-bold mb-8 text-gray-800">Contact Us</h1>
        <div class="bg-white p-8 rounded-lg shadow-md max-w-lg mx-auto">
            <p class="text-xl mb-6">
                We'd love to hear from you! Whether you have questions, want to join us, or need prayer, feel free to reach out.
            </p>

            <form action="#" method="POST"> <!-- Replace # with your form handling endpoint -->
                <div class="mb-4">
                    <label for="name" class="block text-gray-700 text-base font-bold mb-2">Name:</label>
                    <input type="text" id="name" name="name" required class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline text-base">
                </div>
                <div class="mb-4">
                    <label for="email" class="block text-gray-700 text-base font-bold mb-2">Email:</label>
                    <input type="email" id="email" name="email" required class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline text-base">
                </div>
                <div class="mb-6">
                    <label for="message" class="block text-gray-700 text-base font-bold mb-2">Message:</label>
                    <textarea id="message" name="message" rows="5" required class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline text-base"></textarea>
                </div>
                <div class="text-center">
                    <button type="submit" class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-2 px-6 rounded focus:outline-none focus:shadow-outline transition duration-300 ease-in-out text-base">
                        Send Message
                    </button>
                </div>
            </form>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-900 text-white py-8 mt-16">
        <div class="container mx-auto px-6 md:px-12 lg:px-24 text-center text-gray-500 text-sm">
            &copy; 2026 Nations Community. All rights reserved.
        </div>
    </footer>

    <!-- Basic JS for Mobile Menu Toggle (Now handled in main.js) -->
    <script src="/js/main.js" defer></script>

</body>
</html>
